<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridBot v4</title>
<style>
:root {
  --bg:#0d1117; --card:#161b22; --border:#21262d;
  --text:#e6edf3; --dim:#8b949e;
  --green:#3fb950; --red:#f85149; --yellow:#d29922; --blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Cascadia Code','Consolas',monospace;background:var(--bg);color:var(--text);font-size:13px}

.header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header h1{font-size:16px;font-weight:700}
.header-right{display:flex;gap:12px;align-items:center;font-size:12px}
.badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-run{background:rgba(63,185,80,.15);color:var(--green)}
.badge-stop{background:rgba(248,81,73,.15);color:var(--red)}
.badge-pause{background:rgba(210,153,34,.15);color:var(--yellow)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px;max-width:1100px;margin:0 auto}
@media(max-width:768px){.grid{grid-template-columns:1fr;padding:12px}}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:10px;letter-spacing:.5px}
.card-full{grid-column:1/-1}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--dim);font-weight:500;padding:4px 6px;border-bottom:1px solid var(--border)}
td{padding:4px 6px;border-bottom:1px solid rgba(33,38,45,.5)}
.tg{color:var(--green)}.tr{color:var(--red)}.td{color:var(--dim)}

.big-price{font-size:28px;font-weight:700;letter-spacing:-1px}
.sub-row{display:flex;gap:16px;margin-top:6px;font-size:12px;color:var(--dim)}
.kv{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.kv .k{color:var(--dim)}

.controls{display:flex;gap:8px;padding:0 20px 16px;max-width:1100px;margin:0 auto}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer}
.btn:hover{border-color:var(--blue)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,.1)}
</style>
</head>
<body>

<div class="header">
  <h1>GridBot v4</h1>
  <div class="header-right">
    <span id="bal" class="td">--</span>
    <span id="badge" class="badge badge-stop">--</span>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="post('/api/pause')">Pause</button>
  <button class="btn btn-danger" onclick="if(confirm('Close all positions?'))post('/api/close-all')">Close All</button>
</div>

<div class="grid">
  <div class="card">
    <div class="card-title">Market</div>
    <div class="big-price" id="price">--</div>
    <div class="sub-row">
      <span>24h H <span id="hi" class="tg">--</span></span>
      <span>24h L <span id="lo" class="tr">--</span></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Grid Status</div>
    <div class="kv"><span class="k">Center</span><span id="gs-center">--</span></div>
    <div class="kv"><span class="k">Spacing</span><span id="gs-spacing">--</span></div>
    <div class="kv"><span class="k">Levels</span><span id="gs-levels">--</span></div>
    <div class="kv"><span class="k">Total Cycles</span><span id="gs-cycles">--</span></div>
    <div class="kv"><span class="k">Total PnL</span><span id="gs-pnl">--</span></div>
  </div>

  <div class="card card-full">
    <div class="card-title">Levels</div>
    <table>
      <thead><tr><th>ID</th><th>Side</th><th>Price</th><th>Status</th></tr></thead>
      <tbody id="tb-levels"><tr><td colspan="4" class="td">loading...</td></tr></tbody>
    </table>
  </div>

  <div class="card card-full">
    <div class="card-title">Cycle History</div>
    <table>
      <thead><tr><th>Time</th><th>Level</th><th>Entry</th><th>Exit</th><th>PnL</th></tr></thead>
      <tbody id="tb-cycles"><tr><td colspan="5" class="td">loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const f=(v,d=2)=>v!=null?Number(v).toFixed(d):'--';
const usd=v=>v!=null?'$'+Number(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'--';

async function post(u){try{await fetch(u,{method:'POST'})}catch(e){console.error(e)}}
async function get(u){try{const r=await fetch(u);return r.ok?await r.json():null}catch{return null}}

async function tick(){
  const [status,market,state,overview]=await Promise.all([
    get('/api/status'),get('/api/market'),get('/api/engine/state'),get('/api/engine/overview')
  ]);

  if(status){
    const b=$('badge'),mode=status.status||status.mode||'stopped';
    b.textContent=mode.toUpperCase();
    b.className='badge '+(mode.match(/run|active|live/i)?'badge-run':mode.match(/pause/i)?'badge-pause':'badge-stop');
    if(status.daily_pnl!=null){const el=$('gs-pnl');el.textContent=usd(status.daily_pnl);el.className=(status.daily_pnl>=0?'tg':'tr')}
    if(status.balance!=null)$('bal').textContent=usd(status.balance);
  }

  if(market){
    $('price').textContent=usd(market.price||market.last);
    $('hi').textContent=usd(market.high_24h||market.high);
    $('lo').textContent=usd(market.low_24h||market.low);
  }

  if(state){
    if(state.balance&&!status)$('bal').textContent=usd(state.balance);
    $('gs-center').textContent=usd(state.center_price);
    $('gs-spacing').textContent=state.spacing_pct!=null?f(state.spacing_pct,3)+'%':'--';
    const lvls=state.levels||state.grid_levels||[];
    $('gs-levels').textContent=lvls.length;
    if(state.completed_cycles!=null)$('gs-cycles').textContent=state.completed_cycles;

    if(lvls.length){
      $('tb-levels').innerHTML=lvls.map(l=>{
        const s=(l.side||'').toLowerCase();
        return`<tr><td>${l.level??l.id??'--'}</td><td class="${s==='buy'?'tg':'tr'}">${(l.side||'--').toUpperCase()}</td><td>${usd(l.price)}</td><td>${l.status||l.state||'--'}</td></tr>`;
      }).join('');
    }
  }

  const cycles=(overview&&(overview.cycles||overview.history||overview.trades))||
               (state&&(state.cycles||state.history))||[];
  if(cycles.length){
    if(!$('gs-cycles').textContent||$('gs-cycles').textContent==='--')$('gs-cycles').textContent=cycles.length;
    let cum=0;
    const rows=cycles.slice(-20);
    if(overview&&overview.total_pnl!=null){const el=$('gs-pnl');el.textContent=usd(overview.total_pnl);el.className=(overview.total_pnl>=0?'tg':'tr')}
    $('tb-cycles').innerHTML=rows.map(c=>{
      cum+=(c.pnl||0);
      const t=c.time||c.ts||c.closed_at||'';
      const ts=t?new Date(t).toLocaleTimeString('ko'):'--';
      return`<tr><td>${ts}</td><td>${c.level??'--'}</td><td>${usd(c.entry)}</td><td>${usd(c.exit)}</td><td class="${(c.pnl||0)>=0?'tg':'tr'}">${f(c.pnl)}</td></tr>`;
    }).join('');
  }
}

tick();
setInterval(tick,5000);
</script>
</body>
</html>
