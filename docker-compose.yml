services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    restart: always
    stop_grace_period: 30s
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - REDIS_HOST=redis
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build: .
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - REDIS_HOST=redis
    command: ["python", "-m", "uvicorn", "src.monitoring.dashboard:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
