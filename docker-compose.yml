services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    restart: always
    stop_grace_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - REDIS_HOST=redis
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build: .
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - REDIS_HOST=redis
    command: ["python", "-m", "uvicorn", "src.monitoring.dashboard:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info", "--access-log"]
    healthcheck:
      # /health 는 인증 불필요 — 컨테이너 살아있는지 확인
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
