services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  dashboard:
    build: .
    command: uvicorn src.monitoring.dashboard:app --host 0.0.0.0 --port 8000
    restart: always
    depends_on:
      - redis
      - bot
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  redis_data:
