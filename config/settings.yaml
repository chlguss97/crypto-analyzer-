# ── ScalpBot v5 — Jay 단타법 (StochRSI + MACD) ──

strategy: "scalp"

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

scalp:
  enabled: true
  leverage: 10
  timeframe: "30m"              # 30m (Jay 권장, 1h 대비 매매 빈도 2배)
  size_btc: 0.01
  signal_timeout_candles: 3     # 두 번째 조건 대기 최대 캔들 수
  cooldown_sec: 0               # 매매 간 쿨다운 (0=없음)
  bollinger_filter: false       # BB 추가 확인 (선택)

  # StochRSI (TradingView 기본)
  stoch_rsi_period: 14
  stoch_rsi_k: 3
  stoch_rsi_d: 3
  stoch_rsi_ob: 80              # 과매수 기준
  stoch_rsi_os: 20              # 과매도 기준

  # MACD (Jay: fast=8)
  macd_fast: 8
  macd_slow: 26
  macd_signal: 9

  # SL — ATR 기반
  sl_atr_mult: 1.0              # ATR × 배수
  sl_min_pct: 0.5               # 최소 SL %
  sl_max_pct: 2.0               # 최대 SL %

safety:
  circuit_breaker_pct: 2.0
  circuit_breaker_window_sec: 10
  circuit_breaker_freeze_sec: 60
  bot_kill_drawdown_pct: 20

fees:
  maker: 0.0002
  taker: 0.0005

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0
