exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

timeframes:
  execution: "15m"
  confirmation: "1h"
  filter: "4h"

risk:
  # ── 사이즈 모드 ──
  # mode_a: risk_per_trade 기반 (옛 방식, 큰 계좌용)
  # mode_b: margin_loss_cap 기반 (신규, 작은 계좌 + 매물대 SL)
  sizing_mode: "margin_loss_cap"

  # ── mode_b: margin_loss_cap (사용자 의도) ──
  # SL/TP 모두 "마진 손익 %" 기준으로 결정 → 가격 거리 = % / leverage
  # 매물대 SL 은 더 가까울 때만 보호 차원에서 사용
  margin_pct: 0.90              # 04-13: 95→90% (H19: 여유 5% 확보, 소규모 계좌 호환)
  max_margin_loss_pct: 8.0      # 12→8%: SL 가격거리 확대를 위해 마진 손실 한도 하향 (04-15)
                                # 15x에서 8%/15 = 0.53% 가격거리 (~$400 BTC)
  use_indicator_sl: true        # true 면 매물대 SL 과 마진 한도 SL 중 가까운 것 사용

  # TP 마진 손익 % (TP1 만 등록, TP2/TP3 는 러너 트레일에 위임)
  tp1_margin_gain_pct: 15.0     # 20→15%: RR 1.5+ 보장 (SL 8% 대비 TP 15% = RR 1.87) (04-15)
  # 트레일링 (러너 모드 활성화 후)
  trail_margin_pct: 4.0         # 5→4%: 러너 SL 트레일 거리 축소 (더 빠른 본절) (04-15)
  trail_min_price_pct: 0.3      # 0.5→0.3%: 트레일 최소 축소 (이익 보호) (04-15)

  # min_indicator_sl_pct: 매물대 SL 이 너무 가까우면 무시 (즉시 청산 방지)
  # 04-15: 0.40→0.50 상향 — 0.12% SL 즉사 근절 (BTC $75k 기준 $375 이하 SL 차단)
  min_indicator_sl_price_pct: 0.50   # 0.40→0.50: 최소 SL 가격거리 0.5% (04-15)

  # ── mode_a: risk_per_trade (옛, backtest 호환) ──
  risk_per_trade: 0.005

  # ── 공통 ──
  leverage_range: [5, 15]        # [10,30]→[5,15]: 과도한 레버리지 근절 (04-15)
  sl_atr_multiplier: 1.8      # 1.2→1.8: SL 노이즈 즉사 방지 (04-10, 승률 35%→55% 목표)
  sl_min_pct: 0.003
  sl_max_pct: 0.015
  min_expected_profit: 0.0015
  max_positions: 3
  max_same_direction: 2
  max_daily_loss: 0.05
  max_drawdown: 0.15
  max_hold_hours: 6

  # TP 손익비 (R-multiple, R = SL 거리)
  tp1_rr: 1.5    # TP1 = 1.5R (50% 익절)
  tp2_rr: 2.5    # TP2 = 2.5R (러너 모드에서는 미사용)
  tp3_rr: 4.0    # TP3 = 4.0R (러너 모드에서는 미사용)

trailing:
  # 라이브 거래: 진입 시 OKX 서버사이드 SL/TP1/TP2/TP3 등록
  # TP는 PRICE 기준 (반익본절 SL 자동 이동) — main.py 가 R-multiple 로 계산
  # 분할 비율: TP1=50%, TP2=30%, TP3=20% (PositionManager.TP_FRACTIONS)
  tp1_close_pct: 0.5
  tp2_close_pct: 0.3
  tp3_close_pct: 0.2

  # 백테스트(backtest/simulator.py) 호환용 — 라이브에서는 미사용
  breakeven_trigger: 0.008
  tp1_trigger: 0.015
  tp2_trigger: 0.025
  tp3_atr_multiplier: 0.8

cooldown:
  streak_3_min: 30
  streak_5_min: 120

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0

data:
  candle_backfill_days: 30
  slow_path_interval_sec: 180
  health_check_interval_sec: 60
