# ── ScalpBot v5 — Jay 단타법 (StochRSI + MACD) ──

strategy: "scalp"

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

scalp:
  enabled: true
  leverage: 10
  timeframe: "30m"              # 30m (Jay 권장, 1h 대비 매매 빈도 2배)
  size_btc: 0.03
  signal_timeout_candles: 5     # 두 번째 조건 대기 최대 캔들 수 (2.5시간)
  cooldown_sec: 0               # 매매 간 쿨다운 (0=없음)

  # StochRSI (TradingView 기본)
  stoch_rsi_period: 14
  stoch_rsi_k: 3
  stoch_rsi_d: 3
  stoch_rsi_ob: 60              # 진입: 숏 크로스 기준 (상반부)
  stoch_rsi_os: 40              # 진입: 롱 크로스 기준 (하반부)
  stoch_rsi_exit_ob: 80         # 청산: 롱 익절 (K>80 도달)
  stoch_rsi_exit_os: 20         # 청산: 숏 익절 (K<20 도달)

  # MACD (Jay: fast=8)
  macd_fast: 8
  macd_slow: 26
  macd_signal: 9

  # 볼린저밴드 (타점 + SL)
  bb_period: 20                 # Jay "20이평" 기준
  bb_std: 2.0                   # 표준편차
  bb_mid_avoid_pct: 10          # BB 중간 ±5% 구간 매매 금지 (45~55%)

  # SL — BB 밴드 이탈 (primary) + ATR fallback
  sl_atr_mult: 1.0              # ATR × 배수 (BB 없을 때 fallback)
  sl_min_pct: 0.5               # 최소 SL %
  sl_max_pct: 2.0               # 최대 SL %

safety:
  circuit_breaker_pct: 2.0
  circuit_breaker_window_sec: 10
  circuit_breaker_freeze_sec: 60
  bot_kill_drawdown_pct: 20

fees:
  maker: 0.0002
  taker: 0.0005

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0
