exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

# ── FlowEngine v2 (6셋업: LVL/MOM/PB/BRK/DIV/SES) ──

timeframes:
  execution: "15m"
  confirmation: "1h"
  filter: "4h"
  # 통합 모델 참고용 (코드에서는 1m/5m/15m/1h 전부 사용)
  analysis: ["1h", "15m"]
  entry: ["5m", "1m"]

risk:
  sizing_mode: "margin_loss_cap"
  margin_pct: 0.50              # 0.30→0.50: $200 × 0.5 × 15x = $1500 = 0.02 BTC (OKX 최소 충족)
  leverage_range: [15, 20]       # 10~25 → 15~20: SL 거리 0.4~0.53% 확보 + 사이즈 충분
  max_positions: 1              # 3→1: 동시 포지션 1개만
  max_daily_loss: 0.10          # 일일 최대 손실 10%
  max_drawdown: 0.15

  # 레거시 호환 (leverage.py 참조)
  risk_per_trade: 0.005
  sl_atr_multiplier: 1.8
  sl_min_pct: 0.003
  sl_max_pct: 0.015
  max_hold_hours: 6
  max_same_direction: 2
  min_expected_profit: 0.0015
  tp1_rr: 1.5
  tp2_rr: 2.5
  tp3_rr: 4.0
  max_margin_loss_pct: 8.0
  tp1_margin_gain_pct: 12.0
  use_indicator_sl: true
  min_indicator_sl_price_pct: 0.50

  # SL 등록 실패 시 즉시 청산
  sl_fail_close: true

  # ── 연패 사이즈 축소 ──
  streak_sizing:
    3: 0.70   # 3연패: 마진 70%
    5: 0.50   # 5연패: 마진 50%
    10: 0.25  # 10연패: 마진 25%

# ── 셋업별 SL/TP/보유 설정 ──
hold_modes:
  quick:       # MOM, SES (빠른 진입/청산)
    max_hold_min: 15
    sl_margin_pct: 5.0          # 마진 -5%
    tp1_margin_pct: 7.5         # 마진 +7.5% (RR 1.5)
    tp2_mult: 2.0
    tp3_mult: 3.0
  standard:    # LVL, PB, DIV (중간 보유)
    max_hold_min: 45
    sl_margin_pct: 8.0          # 마진 -8%
    tp1_margin_pct: 12.0        # 마진 +12% (RR 1.5)
    tp2_mult: 2.5
    tp3_mult: 4.0
  runner:      # BRK (브레이크아웃 러너)
    max_hold_min: 90
    sl_margin_pct: 6.0
    tp1_margin_pct: 12.0        # 마진 +12% (RR 2.0)
    tp2_mult: 3.0
    tp3_mult: 5.0

trailing:
  tp1_close_pct: 0.5
  tp2_close_pct: 0.3
  tp3_close_pct: 0.2
  trail_margin_pct: 4.0
  trail_min_price_pct: 0.3

# ── 쿨다운 (조건부) ──
cooldown:
  after_loss_sec: 60            # 손절 후 1분 (데이터 축적용)
  after_win_sec: 20             # 익절 후 20초
  direction_flip_sec: 60        # 방향 전환 시 1분
  min_interval_sec: 20          # 최소 진입 간격 20초

# ── 폴링 주기 (04-17: Binance 기준 가속) ──
polling:
  candle_fast_sec: 2            # 1m/5m 캔들 갱신 (3→2초, Binance rate limit 여유)
  candle_slow_sec: 6            # 15m/1h 캔들 갱신 (30→6초)
  signal_eval_sec: 3            # 시그널 평가 (5→3초)
  position_check_sec: 1         # 포지션 SL/TP 체크

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0

data:
  candle_backfill_days: 30
