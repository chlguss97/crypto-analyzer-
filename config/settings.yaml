exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

# ── 통합 모델 (04-15 전면 개편) ──
# Scalp/Swing 분리 → 단일 UnifiedEngine (셋업 ABC)

timeframes:
  # 분석: 1h/15m, 진입: 5m/1m
  analysis: ["1h", "15m"]
  entry: ["5m", "1m"]

risk:
  sizing_mode: "margin_loss_cap"
  margin_pct: 0.30              # 0.90→0.30: 생존 우선 ($200 계좌, 한 번에 잔고 2~3% 리스크)
  leverage_range: [10, 25]
  max_positions: 1              # 3→1: 동시 포지션 1개만
  max_daily_loss: 0.10          # 일일 최대 손실 10%
  max_drawdown: 0.15

  # SL 등록 실패 시 즉시 청산
  sl_fail_close: true

  # ── 연패 사이즈 축소 ──
  streak_sizing:
    3: 0.70   # 3연패: 마진 70%
    5: 0.50   # 5연패: 마진 50%
    10: 0.25  # 10연패: 마진 25%

# ── 셋업별 SL/TP/보유 설정 ──
hold_modes:
  quick:       # 셋업 A (추세 모멘텀)
    max_hold_min: 30
    sl_margin_pct: 6.0          # 마진 -6%
    tp1_margin_pct: 9.0         # 마진 +9% (RR 1.5)
    tp2_mult: 2.0               # TP2 = SL × 2
    tp3_mult: 3.0
  standard:    # 셋업 B, C (OB 리테스트, 브레이크아웃)
    max_hold_min: 60
    sl_margin_pct: 8.0          # 마진 -8%
    tp1_margin_pct: 12.0        # 마진 +12% (RR 1.5)
    tp2_mult: 2.5
    tp3_mult: 4.0
  swing:       # 구조적으로 강한 셋업 (미래 확장용)
    max_hold_min: 120
    sl_margin_pct: 8.0
    tp1_margin_pct: 15.0
    tp2_mult: 3.0
    tp3_mult: 5.0

trailing:
  tp1_close_pct: 0.5
  tp2_close_pct: 0.3
  tp3_close_pct: 0.2
  trail_margin_pct: 4.0
  trail_min_price_pct: 0.3

# ── 쿨다운 (조건부) ──
cooldown:
  after_loss_sec: 180           # 손절 후 3분
  after_win_sec: 60             # 익절 후 1분
  direction_flip_sec: 300       # 방향 전환 시 5분
  min_interval_sec: 60          # 최소 진입 간격 1분

# ── 폴링 주기 ──
polling:
  candle_fast_sec: 3            # 1m/5m 캔들 갱신
  candle_slow_sec: 30           # 15m/1h 캔들 갱신
  signal_eval_sec: 5            # 시그널 평가
  position_check_sec: 1         # 포지션 SL/TP 체크

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0

data:
  candle_backfill_days: 30
