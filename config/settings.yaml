# ── GridBot — ATR-Adaptive Grid Trading ──

strategy: "grid"

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

timeframes:
  candles: ["1m", "5m", "15m", "1h", "4h", "1d"]

# ── 그리드 트레이딩 ──
grid:
  enabled: true
  leverage: 20
  levels: 2                          # 1 buy + 1 sell (잔고 $177 적응)
  size_btc: 0.01                    # 레벨당 1계약 (0.01 BTC)
  atr_mult: 0.6                     # spacing = ATR% × 0.6
  spacing_min_pct: 0.10             # 최소 0.10% (수수료 0.04% 커버)
  spacing_max_pct: 0.50             # 최대 0.50%
  rebalance_sec: 3600               # 1시간마다 ATR 재계산
  drift_rebalance_pct: 150          # 가격이 범위 150% 벗어나면 리밸런스 (자주 안 하게)
  hurst_pause: 0.70                 # Hurst > 0.7 → 그리드 일시정지
  monitor_sec: 1                    # 1초마다 주문 체크
  atr_period: 14                    # ATR 14기간
  atr_timeframe: "5m"               # 5분봉

risk:
  bot_kill_drawdown: 0.20           # -20% DD → 봇 정지

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0
