# ── GridBot v3 — ATR-Adaptive Grid + Leading Regime Detection ──

strategy: "grid"

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

timeframes:
  candles: ["1m", "5m", "15m", "1h", "4h", "1d", "1w"]

# ── 그리드 트레이딩 ──
grid:
  enabled: true
  target_leverage: 8              # 평시 (ATR 따라 6~10 자동)
  size_btc: 0.01                  # 레벨당 1계약 (0.01 BTC)
  atr_mult: 0.6                   # spacing = ATR% × 0.6
  spacing_min_pct: 0.15           # 최소 0.15% (수수료+펀딩 커버)
  spacing_max_pct: 0.50           # 최대 0.50%
  spacing_type: "geometric"       # arithmetic | geometric
  rebalance_sec: 3600             # 1시간 ATR 재계산
  drift_rebalance_pct: 50         # drift > 50% → 리빌드
  monitor_sec: 1                  # 1초 체결 확인
  atr_period: 14
  atr_timeframe: "5m"

# ── 선행 레짐 감지 ──
regime:
  pause_threshold: 0.35           # |CRS| ≥ 0.35 → PAUSED
  resume_threshold: 0.15          # |CRS| < 0.15 → ACTIVE
  pause_confirm_sec: 2            # 정지 확인 (2초 — 빠르게 멈춤)
  resume_confirm_sec: 15          # 복귀 확인 (15초 — 안정 확인 후 재개)
  mode_switch_cooldown_sec: 15    # 모드 전환 최소 간격
  # 서킷브레이커
  circuit_breaker_pct: 2.0        # X% 이동
  circuit_breaker_window_sec: 10  # Y초 내
  circuit_breaker_freeze_sec: 60  # 동결 시간
  # 시그널 가중치 (OBI z-score는 노이즈 많아 축소, CUSUM 강화)
  weight_obi: 0.15
  weight_cvd: 0.30
  weight_volume: 0.20
  weight_cusum: 0.35
  # CUSUM 파라미터
  cusum_threshold: 2.0
  cusum_drift: 0.25

# ── 리스크 ──
risk:
  backstop_drawdown_pct: 20       # 거래소 백스탑 -20% (미구현, 참조용)

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0
