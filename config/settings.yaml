# ── SPEC v2 (2026-04-28) — Momentum Scalping + ML Meta-Label ──

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  margin_mode: "isolated"

data_source: "binance"

timeframes:
  primary: "5m"
  confirmation: "15m"
  filter: "1h"
  candles: ["1m", "5m", "15m", "1h", "4h", "1d"]
  # 레거시 호환
  execution: "5m"
  analysis: ["1h", "15m"]
  entry: ["5m", "1m"]

risk:
  sizing_mode: "margin_loss_cap"
  margin_pct: 0.40
  leverage_range: [15, 20]
  max_positions: 1
  max_daily_loss: 0.05
  max_weekly_loss: 0.10
  max_drawdown: 0.12
  bot_kill_drawdown: 0.15
  profit_protect_pct: 0.03
  profit_stop_pct: 0.05
  min_entry_interval_sec: 30
  max_margin_loss_pct: 5.0
  tp1_margin_gain_pct: 10.0

  # 레거시 호환
  risk_per_trade: 0.005
  sl_atr_multiplier: 2.0
  sl_min_pct: 0.005
  sl_max_pct: 0.010
  use_indicator_sl: true
  min_indicator_sl_price_pct: 0.35
  sl_fail_close: true

  streak_sizing:
    2: 0.80
    3: 0.60
    5: 0.40
    7: 0.25

hold_modes:
  momentum:
    max_hold_min: 45
    sl_margin_pct: 5.0
    tp1_margin_pct: 10.0
    tp2_mult: 2.5
    tp3_mult: 4.0
  breakout:
    max_hold_min: 90
    sl_margin_pct: 5.0
    tp1_margin_pct: 10.0
    tp2_mult: 3.0
    tp3_mult: 5.0
  cascade:
    max_hold_min: 20
    sl_margin_pct: 4.0
    tp1_margin_pct: 8.0
    tp2_mult: 2.0
    tp3_mult: 3.0
  # 레거시 호환
  quick:
    max_hold_min: 20
    sl_margin_pct: 4.0
    tp1_margin_pct: 8.0
    tp2_mult: 2.5
    tp3_mult: 4.0
  standard:
    max_hold_min: 45
    sl_margin_pct: 5.0
    tp1_margin_pct: 10.0
    tp2_mult: 2.5
    tp3_mult: 4.0
  runner:
    max_hold_min: 90
    sl_margin_pct: 5.0
    tp1_margin_pct: 10.0
    tp2_mult: 3.0
    tp3_mult: 5.0

trailing:
  tp1_close_pct: 0.5
  tp2_close_pct: 0.3
  tp3_close_pct: 0.2
  trail_atr_mult: 1.5
  trail_profit_giveback: 0.25
  trail_min_price_pct: 0.15
  trail_margin_pct: 3.0

adverse_selection:
  enabled: true
  window_sec: 90
  margin_threshold_pct: 2.5
  require_cvd_reversal: true
  require_vol_surge: true

candidate:
  momentum:
    min_body_atr_ratio: 0.8
    min_vol_ratio: 1.3
    min_body_ratio: 0.6
  breakout:
    bb_squeeze_pctl: 25
    min_vol_ratio: 1.2
  cascade:
    min_liq_usd: 500000
    min_bias_pct: 0.80
    min_price_change_pct: 0.2

ml:
  phase_a_min_samples: 200
  retrain_interval: 100
  window_size: 500
  min_oos_accuracy: 0.52
  go_threshold: 0.55
  initial_features: 8
  expanded_features_at: 500

cooldown:
  after_loss_sec: 60
  after_win_sec: 20
  streak_3_min: 10
  streak_5_min: 60
  # 레거시 호환
  direction_flip_sec: 120
  min_interval_sec: 30

polling:
  candle_fast_sec: 2
  candle_slow_sec: 6
  signal_eval_sec: 3
  position_check_sec: 1
  shadow_check_sec: 5

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  enabled: true

redis:
  host: "localhost"
  port: 6379
  db: 0

data:
  candle_backfill_days: 30
